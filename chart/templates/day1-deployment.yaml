apiVersion: apps/v1
kind: Deployment
metadata:
  name: wingman-day1
  namespace: {{ include "wingman.namespace" . }}
  labels:
    {{- include "wingman.labels" . | nindent 4 }}
    app.kubernetes.io/component: day1
spec:
  replicas: {{ .Values.replicaCount.day1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: wingman
      app.kubernetes.io/component: day1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wingman
        app.kubernetes.io/component: day1
      annotations:
        # Force pod restart when config/secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "wingman.serviceAccountName" . }}
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: day1
          image: {{ include "wingman.image" (dict "reg" .Values.image.registry "repo" .Values.image.day1.repository "tag" .Values.image.day1.tag) }}
          imagePullPolicy: {{ .Values.image.day1.pullPolicy }}
          ports:
            - containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wingman-config
            - secretRef:
                name: wingman-secrets
          {{- if or .Values.tls.caBundle .Values.clusterStatus.enabled }}
          volumeMounts:
            {{- if .Values.tls.caBundle }}
            - name: ca-bundle
              mountPath: {{ .Values.tls.caBundleMountPath }}
              subPath: ca-bundle.crt
              readOnly: true
            {{- end }}
            {{- if .Values.clusterStatus.enabled }}
            - name: mce-tokens
              mountPath: /etc/wingman/mce-tokens
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.day1 | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if or .Values.tls.caBundle .Values.clusterStatus.enabled }}
      volumes:
        {{- if .Values.tls.caBundle }}
        - name: ca-bundle
          configMap:
            name: wingman-ca-bundle
        {{- end }}
        {{- if .Values.clusterStatus.enabled }}
        - name: mce-tokens
          secret:
            secretName: {{ .Values.clusterStatus.tokensSecretName | quote }}
        {{- end }}
      {{- end }}
