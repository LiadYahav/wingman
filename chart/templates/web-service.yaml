apiVersion: v1
kind: Service
metadata:
  name: wingman-web
  namespace: {{ include "wingman.namespace" . }}
  labels:
    {{- include "wingman.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: wingman
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
