{{- if .Values.openshiftRoute.enabled }}
# OpenShift Route — exposes wingman via the cluster's ingress controller
# This is an OpenShift-specific resource (not available on plain Kubernetes)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: wingman
  namespace: {{ include "wingman.namespace" . }}
  labels:
    {{- include "wingman.labels" . | nindent 4 }}
spec:
  host: {{ .Values.route.host }}
  to:
    kind: Service
    name: wingman-nginx
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.openshiftRoute.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.openshiftRoute.tls.insecureEdgeTerminationPolicy }}
  wildcardPolicy: None
{{- end }}
