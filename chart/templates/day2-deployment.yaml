apiVersion: apps/v1
kind: Deployment
metadata:
  name: wingman-day2
  namespace: {{ include "wingman.namespace" . }}
  labels:
    {{- include "wingman.labels" . | nindent 4 }}
    app.kubernetes.io/component: day2
spec:
  replicas: {{ .Values.replicaCount.day2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: wingman
      app.kubernetes.io/component: day2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wingman
        app.kubernetes.io/component: day2
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "wingman.serviceAccountName" . }}
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: day2
          image: {{ include "wingman.image" (dict "reg" .Values.image.registry "repo" .Values.image.day2.repository "tag" .Values.image.day2.tag) }}
          imagePullPolicy: {{ .Values.image.day2.pullPolicy }}
          ports:
            - containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wingman-config
            - secretRef:
                name: wingman-secrets
          {{- if .Values.tls.caBundle }}
          volumeMounts:
            - name: ca-bundle
              mountPath: {{ .Values.tls.caBundleMountPath }}
              subPath: ca-bundle.crt
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources.day2 | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if .Values.tls.caBundle }}
      volumes:
        - name: ca-bundle
          configMap:
            name: wingman-ca-bundle
      {{- end }}
