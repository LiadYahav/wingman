apiVersion: v1
kind: Secret
metadata:
  name: wingman-secrets
  namespace: {{ include "wingman.namespace" . }}
  labels:
    {{- include "wingman.labels" . | nindent 4 }}
type: Opaque
stringData:
  # GitLab service account token
  GITLAB_ACCESS_TOKEN: {{ .Values.gitlab.accessToken | quote }}

  # JWT signing secret
  JWT_SECRET_KEY: {{ .Values.auth.jwtSecret | quote }}

  # OpenShift OAuth client secret (empty when devAuth.enabled)
  OPENSHIFT_OAUTH_CLIENT_SECRET: {{ .Values.auth.oauthClientSecret | quote }}

  # GitLab webhook verification secret
  GITLAB_WEBHOOK_SECRET: {{ .Values.gitlab.webhookSecret | quote }}

  # Dev auth secret (empty when devAuth.enabled=false)
  DEV_AUTH_SECRET: {{ .Values.devAuth.secret | quote }}
