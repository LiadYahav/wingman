name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python Linting ──────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Lint shared-python
        working-directory: packages/shared-python
        run: |
          uv sync --extra dev
          uv run ruff check src/

      - name: Lint day1-service
        working-directory: apps/day1-service
        run: |
          uv sync --extra dev
          uv run ruff check src/

      - name: Lint day2-service
        working-directory: apps/day2-service
        run: |
          uv sync --extra dev
          uv run ruff check src/

  # ── Python Type Checking ──────────────────────────────────────────────────────
  typecheck-python:
    name: Type Check Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Type check shared-python
        working-directory: packages/shared-python
        run: |
          uv sync --extra dev
          uv run mypy src/wingman_shared --ignore-missing-imports

      - name: Type check day1-service
        working-directory: apps/day1-service
        run: |
          uv sync --extra dev
          uv run mypy src --ignore-missing-imports

      - name: Type check day2-service
        working-directory: apps/day2-service
        run: |
          uv sync --extra dev
          uv run mypy src --ignore-missing-imports

  # ── Python Tests ────────────────────────────────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Test shared-python
        working-directory: packages/shared-python
        run: |
          uv sync --extra dev
          uv run pytest tests/ -v --tb=short || echo "No tests found"

      - name: Test day1-service
        working-directory: apps/day1-service
        run: |
          uv sync --extra dev
          uv run pytest tests/ -v --tb=short || echo "No tests found"

      - name: Test day2-service
        working-directory: apps/day2-service
        run: |
          uv sync --extra dev
          uv run pytest tests/ -v --tb=short || echo "No tests found"

  # ── Frontend Linting ────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint

  # ── Frontend Type Checking ──────────────────────────────────────────────────
  typecheck-frontend:
    name: Type Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript
        working-directory: apps/web
        run: npx tsc --noEmit

  # ── Frontend Build ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend, typecheck-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

  # ── Docker Build ────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-python, typecheck-python, test-python, build-frontend]
    strategy:
      matrix:
        service:
          - name: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - name: day1-service
            context: .
            dockerfile: apps/day1-service/Dockerfile
          - name: day2-service
            context: .
            dockerfile: apps/day2-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: wingman-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Final Check ─────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.build-docker.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed!"
