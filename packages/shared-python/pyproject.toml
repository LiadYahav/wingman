[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wingman-shared"
version = "0.1.0"
description = "Shared library for Wingman platform services"
requires-python = ">=3.12,<3.13"
dependencies = [
    "python-gitlab>=4.13,<5",
    "ruamel.yaml>=0.18,<0.19",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.5,<3",
    "httpx>=0.27,<1",
    "PyJWT>=2.9,<3",
    "jinja2>=3.1,<4",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "ruff>=0.8",
    "mypy>=1.13",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wingman_shared"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
warn_return_any = false
warn_unused_ignores = false
disallow_untyped_defs = false
check_untyped_defs = true
